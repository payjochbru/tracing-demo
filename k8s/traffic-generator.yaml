apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: tracing-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
        - name: traffic-generator
          image: ghcr.io/OWNER/tracing-demo-traffic-generator:latest  # Replace OWNER with your GitHub username/org
          env:
            - name: GATEWAY_URL
              value: http://gateway:8080
            - name: REQUEST_INTERVAL_MS
              value: "3000"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
