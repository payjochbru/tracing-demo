apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: tracing-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/OWNER/tracing-demo-payment:latest  # Replace OWNER with your GitHub username/org
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: payment-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: tracing-demo
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080
